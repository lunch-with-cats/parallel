<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parallel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* テキストエリアの基本スタイル */
        #editor {
            width: 100%;
            height: 100%;
            resize: none;
            outline: none;
            border: none;
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            font-size: 1rem;
            line-height: 1.6;
            color: #1e293b;
            padding: 1.25rem;
            padding-bottom: 5rem; /* ボタンと重ならないための余白 */
        }

        /* スクロールバーのカスタマイズ */
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: #f8fafc;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }

        /* 横幅が狭い時用の微調整 */
        @media (max-width: 320px) {
            #editor {
                padding: 1rem;
            }
        }
    </style>
</head>
<body class="bg-white text-slate-900 min-h-screen flex flex-col h-screen overflow-hidden">

    <!-- ヘッダー：アプリ名をParallelに変更 -->
    <header class="bg-slate-50 border-b shrink-0 px-4 py-2">
        <h1 class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em] flex items-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
            </svg>
            Parallel
        </h1>
    </header>

    <!-- メイン入力エリア -->
    <main class="flex-1 overflow-hidden relative">
        <textarea id="editor" placeholder="Type here..."></textarea>
    </main>

    <!-- 下部固定アクションボタン：両方をアイコン表示に変更 -->
    <footer class="p-3 bg-slate-50 border-t flex justify-center gap-4 shrink-0 shadow-[0_-4px_12px_rgba(0,0,0,0.03)]">
        <!-- コピーボタン（アイコンのみ） -->
        <button id="copyBtn" class="w-14 h-14 flex items-center justify-center bg-blue-600 hover:bg-blue-700 text-white rounded-2xl transition-all shadow-lg active:scale-90" title="コピー">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3" />
            </svg>
        </button>
        <!-- クリアボタン（アイコンのみ） -->
        <button id="clearBtn" class="w-14 h-14 flex items-center justify-center bg-white border border-slate-200 text-slate-400 hover:text-red-500 hover:border-red-200 rounded-2xl transition-all active:scale-90" title="クリア">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
            </svg>
        </button>
    </footer>

    <!-- トースト通知 -->
    <div id="toast" class="fixed bottom-24 left-1/2 -translate-x-1/2 bg-slate-800 text-white px-4 py-2 rounded-full text-xs opacity-0 transition-all duration-300 pointer-events-none z-50 shadow-md">
        Copied!
    </div>

    <!-- クリア確認ダイアログ -->
    <div id="confirmDialog" class="fixed inset-0 bg-slate-900/40 hidden items-center justify-center z-50 backdrop-blur-[2px] p-4">
        <div class="bg-white p-6 rounded-3xl shadow-2xl w-full max-w-[220px] animate-in fade-in zoom-in duration-200">
            <h3 class="text-xs font-bold mb-5 text-slate-800 text-center leading-relaxed">すべて消去しますか？</h3>
            <div class="flex flex-col gap-2">
                <button id="confirmClear" class="w-full py-3 bg-red-600 text-white text-xs font-bold rounded-xl active:scale-95">クリア</button>
                <button id="cancelClear" class="w-full py-3 text-slate-400 text-xs font-medium rounded-xl">キャンセル</button>
            </div>
        </div>
    </div>

    <script>
        const editor = document.getElementById('editor');
        const copyBtn = document.getElementById('copyBtn');
        const clearBtn = document.getElementById('clearBtn');
        const toast = document.getElementById('toast');
        const confirmDialog = document.getElementById('confirmDialog');
        const confirmClear = document.getElementById('confirmClear');
        const cancelClear = document.getElementById('cancelClear');

        const STORAGE_KEY = 'parallel_draft_data';

        window.onload = () => {
            const savedData = localStorage.getItem(STORAGE_KEY);
            if (savedData) {
                editor.value = savedData;
            }
            editor.focus();
        };

        editor.addEventListener('input', () => {
            localStorage.setItem(STORAGE_KEY, editor.value);
        });

        copyBtn.addEventListener('click', () => {
            const content = editor.value;
            if (!content) return;

            const textArea = document.createElement("textarea");
            textArea.value = content;
            document.body.appendChild(textArea);
            textArea.select();
            
            try {
                document.execCommand('copy');
                showToast();
            } catch (err) {
                console.error('Copy failed', err);
            }
            document.body.removeChild(textArea);
        });

        function showToast() {
            toast.style.opacity = '1';
            toast.style.transform = 'translate(-50%, -8px)';
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translate(-50%, 0)';
            }, 1200);
        }

        clearBtn.addEventListener('click', () => {
            if (!editor.value.trim()) return;
            confirmDialog.classList.replace('hidden', 'flex');
        });

        cancelClear.addEventListener('click', () => {
            confirmDialog.classList.replace('flex', 'hidden');
        });

        confirmClear.addEventListener('click', () => {
            editor.value = '';
            localStorage.removeItem(STORAGE_KEY);
            confirmDialog.classList.replace('flex', 'hidden');
            editor.focus();
        });
    </script>
</body>
</html>
